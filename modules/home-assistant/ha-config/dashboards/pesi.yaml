title: Pesi
views:
  - title: Pesi
    path: pesi-dash
    icon: mdi:scale-bathroom
    cards:
      - type: entities
        entities:
          - input_boolean.scale_show_alessio
          - input_boolean.scale_show_enrica

      # --- Weight ---
      - type: custom:card-templater
        card:
          type: custom:mini-graph-card
          entities_template: >-
            [
              {% if is_state('input_boolean.scale_show_alessio', 'on') %}
                {"entity": "sensor.alessio_weight", "name": "Alessio", "color": "#fb8c00"},
              {% endif %}
              {% if is_state('input_boolean.scale_show_enrica', 'on') %}
                {"entity": "sensor.enrica_weight", "name": "Enrica", "color": "#00bcd4"},
              {% endif %}
            ]
          hours_to_show: 1460
          show:
            fill: false
            labels: true
          show_icon: true
          icon: mdi:scale-bathroom
          name: Peso
        entities:
          - input_boolean.scale_show_alessio
          - input_boolean.scale_show_enrica

