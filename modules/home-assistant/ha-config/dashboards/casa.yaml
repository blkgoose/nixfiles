title: Casa
views:
  - title: Casa
    path: home
    icon: mdi:home
    sections:
      - type: grid
        cards:
          # --- Controls ---
          - type: heading
            cards:
              - type: heading
                heading: Controlli

          - type: horizontal-stack
            cards:
              - type: tile
                entity: input_boolean.movie_mode
                name: "Movie mode"
                icon: mdi:movie-open
                color: amber
                features:
                  - type: light-brightness

              - type: tile
                entity: input_boolean.bus_waiting
                name: "Autobus"
                icon: mdi:bus
                color: cyan

          # --- Plants ---
          - type: heading
            cards:
              - type: heading
                heading: Piante

          - type: custom:mushroom-template-card
            primary: "Piante"
            secondary: ""
            icon: mdi:flower
            tap_action:
              action: navigate
              navigation_path: /piante-dash
            icon_color: >-
              {% if is_state('sensor.piante', 'green') %}#81c784
              {% elif is_state('sensor.piante', 'orange') %}#ffb74d
              {% elif is_state('sensor.piante', 'red') %}#e57373
              {% else %}gray{% endif %}

          # --- Blinds ---
          - type: heading
            cards:
              - type: heading
                heading: Serrande

          - type: horizontal-stack
            cards:
              - type: tile
                entity: cover.living_room_shutter_smart
                name: Salone
                icon: mdi:blinds
                features:
                  - type: cover-position

              - type: tile
                entity: cover.bedroom_shutter
                name: Camera
                icon: mdi:blinds
                features:
                  - type: cover-position

          # --- Lights ---
          - type: heading
            cards:
              - type: heading
                heading: Luci

          - type: horizontal-stack
            cards:
              - type: tile
                entity: light.varmblixt_table_wall_lamp
                name: Lampada
                icon: mdi:lightbulb
                features:
                  - type: light-brightness
