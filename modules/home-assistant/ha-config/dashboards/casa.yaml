title: Casa
views:
  - title: Casa
    path: home
    icon: mdi:home
    cards:
      # --- Controls ---
      - type: heading
        cards:
          - type: heading
            heading: Controlli

      - type: horizontal-stack
        cards:
          - type: tile
            entity: input_boolean.movie_mode
            name: "Movie mode"
            icon: mdi:movie-open
            features:
              - type: light-brightness

          - type: tile
            entity: input_boolean.bus_waiting
            name: "Autobus"
            icon: mdi:bus

      # --- Blinds ---
      - type: heading
        cards:
          - type: heading
            heading: Serrande

      - type: horizontal-stack
        cards:
          - type: tile
            entity: cover.living_room_shutter_smart
            name: Salone
            icon: mdi:blinds
            features:
              - type: cover-position

          - type: tile
            entity: cover.bedroom_shutter
            name: Camera
            icon: mdi:blinds
            features:
              - type: cover-position

      # --- Lights ---
      - type: heading
        cards:
          - type: heading
            heading: Luci

      - type: horizontal-stack
        cards:
          - type: tile
            entity: light.varmblixt_table_wall_lamp
            name: Lampada
            icon: mdi:lightbulb
            features:
              - type: light-brightness
