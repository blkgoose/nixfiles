views:
  - title: Casa
    path: casa
    icon: mdi:home
    sections:
      - type: grid
        cards:
          # --- Toggles ---
          - type: heading
            cards:
              - type: heading
                heading: Controlli

          - type: horizontal-stack
            cards:
              - type: tile
                entity: input_boolean.movie_mode
                name: Movie
                icon: mdi:movie-open
                color: amber

              - type: tile
                entity: input_boolean.bus_waiting
                name: Autobus
                icon: mdi:bus
                color: cyan

          # --- Plants ---
          - type: heading
            cards:
              - type: heading
                heading: Piante

          - type: conditional
            conditions:
              - entity: sensor.plant_sensor_1_color
                state: green
            card:
              type: tile
              entity: sensor.plant_sensor_1_plant_status
              name: "Callo Basilio I - Basilico"
              icon: mdi:leaf
              color: green
              tap_action:
                action: more-info
                entity: sensor.plant_sensor_1_humidity

          - type: conditional
            conditions:
              - entity: sensor.plant_sensor_1_color
                state: orange
            card:
              type: tile
              entity: sensor.plant_sensor_1_plant_status
              name: "Callo I - Basilico"
              icon: mdi:leaf
              color: orange
              tap_action:
                action: more-info
                entity: sensor.plant_sensor_1_humidity

          - type: conditional
            conditions:
              - entity: sensor.plant_sensor_1_color
                state: red
            card:
              type: tile
              entity: sensor.plant_sensor_1_plant_status
              name: "Callo I - Basilico"
              icon: mdi:leaf
              color: red
              tap_action:
                action: more-info
                entity: sensor.plant_sensor_1_humidity

          # --- Blinds ---
          - type: heading
            cards:
              - type: heading
                heading: Serrande

          - type: horizontal-stack
            cards:
              - type: tile
                entity: cover.living_room_shutter_smart
                name: Salone
                icon: mdi:blinds
                features:
                  - type: cover-position

              - type: tile
                entity: cover.bedroom_shutter
                name: Camera
                icon: mdi:blinds
                features:
                  - type: cover-position

          # --- Lights ---
          - type: heading
            cards:
              - type: heading
                heading: Luci

          - type: horizontal-stack
            cards:
              - type: tile
                entity: light.varmblixt_table_wall_lamp
                name: Lampada
                icon: mdi:lightbulb
                features:
                  - type: light-brightness
