title: Piante
views:
  - title: Piante
    path: piante-dash
    icon: mdi:flower
    cards:
      # --- Callo Basilio I ---
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.plant_sensor_1_humidity
            name: "Callo Basilio I - Basilico"
        hours_to_show: 24
        color_thresholds:
          - value: 35
            color: "#e57373"
          - value: 40
            color: "#ffb74d"
          - value: 45
            color: "#81c784"
          - value: 75
            color: "#81c784"
          - value: 80
            color: "#ffb74d"
          - value: 85
            color: "#e57373"
        show:
          fill: false
        show_icon: true
        icon: mdi:leaf

      # --- Ariel ---
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.plant_sensor_2_humidity
            name: "Ariel - Edera Variegata"
        hours_to_show: 24
        color_thresholds:
          - value: 20
            color: "#e57373"
          - value: 25
            color: "#ffb74d"
          - value: 30
            color: "#81c784"
          - value: 65
            color: "#81c784"
          - value: 70
            color: "#ffb74d"
          - value: 75
            color: "#e57373"
        show:
          fill: false
        show_icon: true
        icon: mdi:leaf

      # --- Babybel ---
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.plant_sensor_3_humidity
            name: "Babybel - Garofanino"
        hours_to_show: 24
        color_thresholds:
          - value: 10
            color: "#e57373"
          - value: 15
            color: "#ffb74d"
          - value: 20
            color: "#81c784"
          - value: 55
            color: "#81c784"
          - value: 60
            color: "#ffb74d"
          - value: 65
            color: "#e57373"
        show:
          fill: false
        show_icon: true
        icon: mdi:leaf
