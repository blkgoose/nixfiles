# Loads default set of integrations. Do not remove.
default_config:

plant_monitor:
  plants:
    basil:
      name: "Callo Basilio I"
      sensor: "sensor.plant_sensor_1_humidity"
      min_humidity: 40
      max_humidity: 80
      max_time_above: 48
      max_time_below: 4
    variegated_ivy:
      name: "Ariel"
      sensor: "sensor.plant_sensor_2_humidity"
      min_humidity: 25
      max_humidity: 70
      max_time_above: 72
      max_time_below: 24
    dianthus:
      name: "Babybel"
      sensor: "sensor.plant_sensor_3_humidity"
      min_humidity: 15
      max_humidity: 60
      max_time_above: 24
      max_time_below: 48
    sedum:
      name: "Dory"
      sensor: "sensor.plant_sensor_4_humidity"
      min_humidity: 10
      max_humidity: 50
      max_time_above: 12
      max_time_below: 72

sensor:
  - platform: plant_monitor

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  mode: storage
  dashboards:
    casa-dash:
      mode: yaml
      title: Casa
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/casa.yaml
    piante-dash:
      mode: yaml
      title: Piante
      icon: mdi:flower
      show_in_sidebar: true
      filename: dashboards/piante.yaml

script: !include scripts.yaml
scene: !include scenes.yaml

input_number:
  projector_blinds_previous_position:
    name: "Blinds position before projector override"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
  projector_lamp_previous_brightness:
    name: "Lamp brightness before projector override"
    min: -1
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
  plant_basil_min_humidity:
    name: "Basil min humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 40
  plant_basil_max_humidity:
    name: "Basil max humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 80
  plant_basil_max_time_above:
    name: "Basil max time above (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 48
  plant_basil_max_time_below:
    name: "Basil max time below (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 4
  plant_variegated_ivy_min_humidity:
    name: "Ariel min humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 25
  plant_variegated_ivy_max_humidity:
    name: "Ariel max humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 70
  plant_variegated_ivy_max_time_above:
    name: "Ariel max time above (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 72
  plant_variegated_ivy_max_time_below:
    name: "Ariel max time below (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 24
  plant_dianthus_min_humidity:
    name: "Babybel min humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 15
  plant_dianthus_max_humidity:
    name: "Babybel max humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 60
  plant_dianthus_max_time_above:
    name: "Babybel max time above (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 24
  plant_dianthus_max_time_below:
    name: "Babybel max time below (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 48
  plant_sedum_min_humidity:
    name: "Dory min humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 10
  plant_sedum_max_humidity:
    name: "Dory max humidity"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    initial: 50
  plant_sedum_max_time_above:
    name: "Dory max time above (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 12
  plant_sedum_max_time_below:
    name: "Dory max time below (h)"
    min: 1
    max: 168
    step: 1
    unit_of_measurement: "h"
    mode: box
    initial: 72

input_datetime:
  plant_basil_last_above_max:
    name: "Basil last above max"
    has_date: true
    has_time: true
  plant_basil_last_below_min:
    name: "Basil last below min"
    has_date: true
    has_time: true
  plant_variegated_ivy_last_above_max:
    name: "Ariel last above max"
    has_date: true
    has_time: true
  plant_variegated_ivy_last_below_min:
    name: "Ariel last below min"
    has_date: true
    has_time: true
  plant_dianthus_last_above_max:
    name: "Babybel last above max"
    has_date: true
    has_time: true
  plant_dianthus_last_below_min:
    name: "Babybel last below min"
    has_date: true
    has_time: true
  plant_sedum_last_above_max:
    name: "Dory last above max"
    has_date: true
    has_time: true
  plant_sedum_last_below_min:
    name: "Dory last below min"
    has_date: true
    has_time: true

input_boolean:
  bus_waiting:
    name: "Waiting for bus"
    icon: mdi:bus
  movie_mode:
    name: "Movie mode"
    icon: mdi:movie-open

rest:
  - resource: "https://giromilano.atm.it/proxy.tpportal/api/tpPortal/geodata/pois/stops/11661"
    headers:
      Accept: "application/json, text/plain, */*"
      User-Agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36"
      sec-ch-ua: '"Google Chrome";v="149", "Chromium";v="149", "Not)A;Brand";v="24"'
      sec-fetch-dest: empty
      sec-fetch-mode: cors
      sec-fetch-site: same-origin
    scan_interval: 60
    sensor:
      - name: "Bus 51 Niguarda wait"
        value_template: >-
          {{ value_json.Lines | selectattr('Line.LineId', 'equalto', '51') | selectattr('Direction', 'equalto', '1') | map(attribute='WaitMessage') | first }}
        icon: mdi:bus

template:
  - sensor:
      - name: "Plants"
        unique_id: "sensor_piante_overall"
        state: >-
          {% set colors = [
            states('sensor.callo_i_basilico_color'),
            states('sensor.ariel_color'),
            states('sensor.babybel_color'),
            states('sensor.dory_color')
          ] %}
          {% if 'red' in colors %}red
          {% elif 'orange' in colors %}orange
          {% elif 'green' in colors %}green
          {% else %}grey
          {% endif %}
      - name: "Plants average temperature"
        unique_id: "sensor_piante_avg_temp"
        state: >-
          {% set temps = [states('sensor.plant_sensor_1_temperature') | float(0),
              states('sensor.plant_sensor_2_temperature') | float(0),
              states('sensor.plant_sensor_3_temperature') | float(0),
              states('sensor.plant_sensor_4_temperature') | float(0)] | select('>', 0) | list %}
          {% if temps | count > 0 %}{{ (temps | sum / temps | count) | round(1) }}
          {% else %}unknown{% endif %}
        unit_of_measurement: "°C"
        icon: mdi:thermometer
      - name: "Bus 51 minutes"
        state: >-
          {% set w = states('sensor.bus_51_niguarda_wait') | lower %}
          {% if 'in arrivo' in w or 'arrivo' in w %}0
          {% elif w | regex_replace('[^0-9]', '') | int(0) > 0 %}{{ w | regex_replace('[^0-9]', '') | int(0) }}
          {% else %}-1
          {% endif %}
        unit_of_measurement: "min"
        icon: mdi:bus-clock

  - switch:
      - name: "Living room shutter up"
        unique_id: "living_room_shutter_up"
        state: "{{ is_state_attr('cover.living_room_shutter', 'is_opening', true) }}"
        turn_on:
          - action: cover.open_cover
            target:
              entity_id: cover.living_room_shutter
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.living_room_shutter

      - name: "Living room shutter down"
        unique_id: "living_room_shutter_down"
        state: "{{ is_state_attr('cover.living_room_shutter', 'is_closing', true) }}"
        turn_on:
          - action: cover.close_cover
            target:
              entity_id: cover.living_room_shutter
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.living_room_shutter

      - name: "Bedroom shutter up"
        unique_id: "bedroom_shutter_up"
        state: "{{ is_state_attr('cover.serranda_camera', 'is_opening', true) }}"
        turn_on:
          - action: cover.open_cover
            target:
              entity_id: cover.serranda_camera
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.serranda_camera

      - name: "Bedroom shutter down"
        unique_id: "bedroom_shutter_down"
        state: "{{ is_state_attr('cover.serranda_camera', 'is_closing', true) }}"
        turn_on:
          - action: cover.close_cover
            target:
              entity_id: cover.serranda_camera
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.serranda_camera

cover:
  - platform: cover_time_based_synced
    devices:
      living_room_shutter:
        name: "Living room shutter"
        travelling_time_up: 19
        travelling_time_down: 19
        open_switch_entity_id: switch.living_room_shutter_up
        close_switch_entity_id: switch.living_room_shutter_down
        send_stop_at_ends: True
        source_entity_id: cover.living_room_shutter
      bedroom_shutter:
        name: "Bedroom shutter"
        travelling_time_up: 27
        travelling_time_down: 27
        open_switch_entity_id: switch.bedroom_shutter_up
        close_switch_entity_id: switch.bedroom_shutter_down
        send_stop_at_ends: True
        source_entity_id: cover.serranda_camera

command_line:
  - binary_sensor:
      name: "Projector online"
      scan_interval: 1
      command: "sh /config/check_projector.sh"
      payload_on: "ON"
      payload_off: "OFF"

automation:
  - id: scroll_wheel_up
    alias: "Scroll wheel: up toggle"
    triggers:
      - trigger: state
        entity_id: event.bilresa_scroll_wheel_button_1
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: cover.living_room_shutter_smart
                state: "opening"
            sequence:
              - action: cover.stop_cover
                target:
                  entity_id: cover.living_room_shutter_smart
        default:
          - action: cover.open_cover
            target:
              entity_id: cover.living_room_shutter_smart

  - id: scroll_wheel_down
    alias: "Scroll wheel: down toggle"
    triggers:
      - trigger: state
        entity_id: event.bilresa_scroll_wheel_button_2
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: cover.living_room_shutter_smart
                state: "closing"
            sequence:
              - action: cover.stop_cover
                target:
                  entity_id: cover.living_room_shutter_smart
        default:
          - action: cover.close_cover
            target:
              entity_id: cover.living_room_shutter_smart

  - id: scroll_wheel_stop
    alias: "Scroll wheel: stop"
    triggers:
      - trigger: state
        entity_id: event.bilresa_scroll_wheel_button_3
    actions:
      - action: cover.stop_cover
        target:
          entity_id: cover.living_room_shutter_smart

  - id: projector_on_movie_mode
    alias: "Projector on: enable movie mode"
    triggers:
      - trigger: state
        entity_id: binary_sensor.projector_online
        to: "on"
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.movie_mode

  - id: projector_off_movie_mode
    alias: "Projector off: disable movie mode"
    triggers:
      - trigger: state
        entity_id: binary_sensor.projector_online
        to: "off"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.movie_mode

  - id: movie_mode_on
    alias: "Movie mode: dim lights and close blinds"
    triggers:
      - trigger: state
        entity_id: input_boolean.movie_mode
        to: "on"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.projector_blinds_previous_position
        data:
          value: "{{ state_attr('cover.living_room_shutter_smart', 'current_position') | int(0) }}"
      - action: cover.set_cover_position
        target:
          entity_id: cover.living_room_shutter_smart
        data:
          position: 10
      - action: input_number.set_value
        target:
          entity_id: input_number.projector_lamp_previous_brightness
        data:
          value: >-
            {% if is_state('light.varmblixt_table_wall_lamp', 'on') %}
              {{ (state_attr('light.varmblixt_table_wall_lamp', 'brightness') | int(0) / 255 * 100) | round(0) }}
            {% else %}-1{% endif %}
      - choose:
          - conditions:
              - condition: state
                entity_id: light.varmblixt_table_wall_lamp
                state: "on"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: light.varmblixt_table_wall_lamp
                data:
                  brightness_pct: 20

  - id: movie_mode_off
    alias: "Movie mode: restore lights and blinds"
    triggers:
      - trigger: state
        entity_id: input_boolean.movie_mode
        to: "off"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.projector_lamp_previous_brightness') | float(-1) >= 0 }}"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: light.varmblixt_table_wall_lamp
                data:
                  brightness_pct: "{{ states('input_number.projector_lamp_previous_brightness') | int(0) }}"
        default:
          - action: light.turn_off
            target:
              entity_id: light.varmblixt_table_wall_lamp
      - action: input_number.set_value
        target:
          entity_id: input_number.projector_lamp_previous_brightness
        data:
          value: -1
      - action: cover.set_cover_position
        target:
          entity_id: cover.living_room_shutter_smart
        data:
          position: "{{ states('input_number.projector_blinds_previous_position') | int(0) }}"

  - id: bus_51_enabled
    alias: "Bus 51: notify when waiting enabled"
    triggers:
      - trigger: state
        entity_id: input_boolean.bus_waiting
        to: "on"
    actions:
      - action: notify.notify
        data:
          title: "Bus 51"
          message: "Ti avviso quando il bus è in arrivo"

  - id: bus_51_notification
    alias: "Bus 51: notify when approaching"
    triggers:
      - trigger: state
        entity_id: sensor.bus_51_minutes
    conditions:
      - condition: state
        entity_id: input_boolean.bus_waiting
        state: "on"
      - condition: numeric_state
        entity_id: sensor.bus_51_minutes
        below: 10
    actions:
      - action: notify.notify
        data:
          title: "Bus 51 in arrivo"
          message: >-
            {% set m = states('sensor.bus_51_minutes') | int(-1) %}
            {% if m == 0 %}Il bus 51 è in arrivo!
            {% else %}Il bus 51 per Niguarda arriva tra {{ m }} minuti
            {% endif %}
