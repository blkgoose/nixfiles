# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  mode: storage
  dashboards:
    casa-dash:
      mode: yaml
      title: Casa
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/casa.yaml

script: !include scripts.yaml
scene: !include scenes.yaml

input_number:
  projector_blinds_previous_position:
    name: "Blinds position before projector override"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
  projector_lamp_previous_brightness:
    name: "Lamp brightness before projector override"
    min: -1
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box

input_boolean:
  plant_sensor_1_critical:
    name: "Plant sensor 1 critical"
    icon: mdi:alert-circle

input_text:
  plant_sensor_1_name:
    name: "Plant sensor 1 name"
    initial: "Callo I - Basilico"
    max: 50

input_datetime:
  plant_sensor_1_last_low_humidity:
    name: "Plant sensor 1 last low humidity"
    has_date: true
    has_time: true

rest:
  - resource: "https://giromilano.atm.it/proxy.tpportal/api/tpPortal/geodata/pois/stops/11661"
    headers:
      Accept: "application/json, text/plain, */*"
      User-Agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36"
      sec-ch-ua: '"Google Chrome";v="149", "Chromium";v="149", "Not)A;Brand";v="24"'
      sec-fetch-dest: empty
      sec-fetch-mode: cors
      sec-fetch-site: same-origin
    scan_interval: 60
    sensor:
      - name: "Bus 51 Niguarda wait"
        value_template: >-
          {{ value_json.Lines | selectattr('Line.LineId', 'equalto', '51') | selectattr('Direction', 'equalto', '1') | map(attribute='WaitMessage') | first }}
        icon: mdi:bus

template:
  - binary_sensor:
      - name: "Plant sensor 1 humidity out of range"
        state: >-
          {% set h = states('sensor.plant_sensor_1_humidity') | float(45) %}
          {{ h < 35 or h > 55 }}
        icon: mdi:water-alert

  - sensor:
      - name: "Plant sensor 1 color"
        state: >-
          {% set h = states('sensor.plant_sensor_1_humidity') | float(45) %}
          {% set critical = is_state('input_boolean.plant_sensor_1_critical', 'on') %}
          {% set last_low = states('input_datetime.plant_sensor_1_last_low_humidity') %}
          {% set last_low_ts = as_timestamp(last_low, 0) %}
          {% set hours_since_low = ((now().timestamp() - last_low_ts) / 3600) | round(1) if last_low_ts > 0 else 999 %}
          {% if h >= 35 and h <= 55 %}green
          {% elif h > 55 and hours_since_low < 48 %}green
          {% elif critical %}red
          {% else %}orange
          {% endif %}

  - sensor:
      - name: "Plant sensor 1 plant status"
        state: >-
          {% set h = states('sensor.plant_sensor_1_humidity') | float(45) %}
          {% set t = states('sensor.plant_sensor_1_temperature') | float(0) | round(0) %}
          {% set critical = is_state('input_boolean.plant_sensor_1_critical', 'on') %}
          {% set last_low = states('input_datetime.plant_sensor_1_last_low_humidity') %}
          {% set last_low_ts = as_timestamp(last_low, 0) %}
          {% set hours_since_low = ((now().timestamp() - last_low_ts) / 3600) | round(1) if last_low_ts > 0 else 999 %}
          {% if h >= 35 and h <= 55 %}{{ h | round(0) }}% · {{ t }}°C
          {% elif h > 55 and hours_since_low < 48 %}{{ h | round(0) }}% · {{ t }}°C
          {% elif critical %}{{ h | round(0) }}% · {{ t }}°C ⚠
          {% else %}{{ h | round(0) }}% · {{ t }}°C ⚠
          {% endif %}
        icon: >-
          {% set h = states('sensor.plant_sensor_1_humidity') | float(45) %}
          {% set critical = is_state('input_boolean.plant_sensor_1_critical', 'on') %}
          {% set last_low = states('input_datetime.plant_sensor_1_last_low_humidity') %}
          {% set last_low_ts = as_timestamp(last_low, 0) %}
          {% set hours_since_low = ((now().timestamp() - last_low_ts) / 3600) | round(1) if last_low_ts > 0 else 999 %}
          {% if h >= 35 and h <= 55 %}mdi:flower
          {% elif h > 55 and hours_since_low < 48 %}mdi:flower
          {% elif critical %}mdi:alert-circle
          {% else %}mdi:alert
          {% endif %}
        attributes:
          name: "{{ states('input_text.plant_sensor_1_name') }}"
          humidity: "{{ states('sensor.plant_sensor_1_humidity') | float(0) }}"
          temperature: "{{ states('sensor.plant_sensor_1_temperature') | float(0) }}"
          ideal_humidity: 45
          hours_since_watered: >-
            {% set last_low = states('input_datetime.plant_sensor_1_last_low_humidity') %}
            {% set last_low_ts = as_timestamp(last_low, 0) %}
            {{ ((now().timestamp() - last_low_ts) / 3600) | round(1) if last_low_ts > 0 else 'unknown' }}
          color: >-
            {% set h = states('sensor.plant_sensor_1_humidity') | float(45) %}
            {% set critical = is_state('input_boolean.plant_sensor_1_critical', 'on') %}
            {% set last_low = states('input_datetime.plant_sensor_1_last_low_humidity') %}
            {% set last_low_ts = as_timestamp(last_low, 0) %}
            {% set hours_since_low = ((now().timestamp() - last_low_ts) / 3600) | round(1) if last_low_ts > 0 else 999 %}
            {% if h >= 35 and h <= 55 %}green
            {% elif h > 55 and hours_since_low < 48 %}green
            {% elif critical %}red
            {% else %}orange
            {% endif %}

  - switch:
      - name: "Living room shutter up"
        unique_id: "living_room_shutter_up"
        state: "{{ is_state_attr('cover.living_room_shutter', 'is_opening', true) }}"
        turn_on:
          - action: cover.open_cover
            target:
              entity_id: cover.living_room_shutter
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.living_room_shutter

      - name: "Living room shutter down"
        unique_id: "living_room_shutter_down"
        state: "{{ is_state_attr('cover.living_room_shutter', 'is_closing', true) }}"
        turn_on:
          - action: cover.close_cover
            target:
              entity_id: cover.living_room_shutter
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.living_room_shutter

      - name: "Bedroom shutter up"
        unique_id: "bedroom_shutter_up"
        state: "{{ is_state_attr('cover.serranda_camera', 'is_opening', true) }}"
        turn_on:
          - action: cover.open_cover
            target:
              entity_id: cover.serranda_camera
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.serranda_camera

      - name: "Bedroom shutter down"
        unique_id: "bedroom_shutter_down"
        state: "{{ is_state_attr('cover.serranda_camera', 'is_closing', true) }}"
        turn_on:
          - action: cover.close_cover
            target:
              entity_id: cover.serranda_camera
        turn_off:
          - action: cover.stop_cover
            target:
              entity_id: cover.serranda_camera

cover:
  - platform: cover_time_based_synced
    devices:
      living_room_shutter:
        name: "Living room shutter"
        travelling_time_up: 19
        travelling_time_down: 19
        open_switch_entity_id: switch.living_room_shutter_up
        close_switch_entity_id: switch.living_room_shutter_down
        send_stop_at_ends: True
        source_entity_id: cover.living_room_shutter
      bedroom_shutter:
        name: "Bedroom shutter"
        travelling_time_up: 27
        travelling_time_down: 27
        open_switch_entity_id: switch.bedroom_shutter_up
        close_switch_entity_id: switch.bedroom_shutter_down
        send_stop_at_ends: True
        source_entity_id: cover.serranda_camera

command_line:
  - binary_sensor:
      name: "Projector online"
      scan_interval: 1
      command: "sh /config/check_projector.sh"
      payload_on: "ON"
      payload_off: "OFF"

automation:
  - id: plant_sensor_1_warning
    alias: "Plant sensor 1: humidity warning"
    triggers:
      - trigger: state
        entity_id: binary_sensor.plant_sensor_1_humidity_out_of_range
        to: "on"
        for:
          minutes: 30
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.plant_sensor_1_critical
      - action: notify.notify
        data:
          title: "Callo needs water!"
          message: >-
            Humidity is {{ states('sensor.plant_sensor_1_humidity') }}% (ideal: 45%).
            Been out of range for 30 minutes.

  - id: plant_sensor_1_ok
    alias: "Plant sensor 1: humidity recovered"
    triggers:
      - trigger: state
        entity_id: binary_sensor.plant_sensor_1_humidity_out_of_range
        to: "off"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.plant_sensor_1_critical

  - id: plant_sensor_1_track_low
    alias: "Plant sensor 1: track last low humidity"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.plant_sensor_1_humidity
        below: 40
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.plant_sensor_1_last_low_humidity
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - id: scroll_wheel_up
    alias: "Scroll wheel: up toggle"
    triggers:
      - trigger: state
        entity_id: event.bilresa_scroll_wheel_button_1
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: cover.living_room_shutter_smart
                state: "opening"
            sequence:
              - action: cover.stop_cover
                target:
                  entity_id: cover.living_room_shutter_smart
        default:
          - action: cover.open_cover
            target:
              entity_id: cover.living_room_shutter_smart

  - id: scroll_wheel_down
    alias: "Scroll wheel: down toggle"
    triggers:
      - trigger: state
        entity_id: event.bilresa_scroll_wheel_button_2
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: cover.living_room_shutter_smart
                state: "closing"
            sequence:
              - action: cover.stop_cover
                target:
                  entity_id: cover.living_room_shutter_smart
        default:
          - action: cover.close_cover
            target:
              entity_id: cover.living_room_shutter_smart

  - id: scroll_wheel_stop
    alias: "Scroll wheel: stop"
    triggers:
      - trigger: state
        entity_id: event.bilresa_scroll_wheel_button_3
    actions:
      - action: cover.stop_cover
        target:
          entity_id: cover.living_room_shutter_smart

  - id: projector_on_close_blinds
    alias: "Projector on: close blinds if sun is out"
    triggers:
      - trigger: state
        entity_id: binary_sensor.projector_online
        to: "on"
    conditions:
      - condition: state
        entity_id: sun.sun
        state: "above_horizon"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.projector_blinds_previous_position
        data:
          value: "{{ state_attr('cover.living_room_shutter_smart', 'current_position') | int(0) }}"
      - action: cover.set_cover_position
        target:
          entity_id: cover.living_room_shutter_smart
        data:
          position: 10

  - id: projector_on_dim_lamp
    alias: "Projector on: save and dim Varmblixt to 20% if on"
    triggers:
      - trigger: state
        entity_id: binary_sensor.projector_online
        to: "on"
    conditions:
      - condition: state
        entity_id: light.varmblixt_table_wall_lamp
        state: "on"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.projector_lamp_previous_brightness
        data:
          value: "{{ (state_attr('light.varmblixt_table_wall_lamp', 'brightness') | int(0) / 255 * 100) | round(0) }}"
      - action: light.turn_on
        target:
          entity_id: light.varmblixt_table_wall_lamp
        data:
          brightness_pct: 20

  - id: projector_off_restore_blinds
    alias: "Projector off: restore blinds and lamp"
    triggers:
      - trigger: state
        entity_id: binary_sensor.projector_online
        to: "off"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_number.projector_lamp_previous_brightness') | float(-1) >= 0 }}"
            sequence:
              - action: light.turn_on
                target:
                  entity_id: light.varmblixt_table_wall_lamp
                data:
                  brightness_pct: "{{ states('input_number.projector_lamp_previous_brightness') | int(0) }}"
        default:
          - action: light.turn_off
            target:
              entity_id: light.varmblixt_table_wall_lamp
      - action: input_number.set_value
        target:
          entity_id: input_number.projector_lamp_previous_brightness
        data:
          value: -1
      - choose:
          - conditions:
              - condition: state
                entity_id: sun.sun
                state: "above_horizon"
            sequence:
              - action: cover.set_cover_position
                target:
                  entity_id: cover.living_room_shutter_smart
                data:
                  position: "{{ states('input_number.projector_blinds_previous_position') | int(0) }}"
